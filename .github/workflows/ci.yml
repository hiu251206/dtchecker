name: Web App CI Testing

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test-and-verify:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm' # Tự động cache npm dependencies để chạy nhanh hơn ở các lần sau

    - name: Cài đặt thư viện (Dependencies)
      run: npm ci

    - name: Chạy Kiểm thử đơn vị (Unit Tests) với Vitest
      run: npm run test:run

    - name: Cài đặt các trình duyệt cho Playwright
      run: npx playwright install --with-deps chromium

    - name: Chạy Kiểm thử E2E với Playwright
      run: npm run test:e2e

    - name: Tạo báo cáo kiểm thử với Allure
      if: always()
      run: npm run allure:generate

    - name: Tải báo cáo kiểm thử lên GitHub Artifacts
      uses: actions/upload-artifact@v4
      if: always() # Luôn chạy bước này ngay cả khi các bước test trước đó bị thất bại
      with:
        name: test-reports
        path: |
          playwright-report/
          allure-report/
        retention-days: 15 # Lưu trữ báo cáo trong 15 ngày

    - name: Deploy báo cáo Allure lên GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
      continue-on-error: true
